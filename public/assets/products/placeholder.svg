<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533" fill="none">
  <!-- Background -->
  <rect width="400" height="533" fill="#F0F4FF"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E0E8FF" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="533" fill="url(#grid)"/>

  <!-- Drum body (Jerry Can style) -->
  <rect x="120" y="160" width="160" height="200" rx="20" fill="#C7D9F8"/>

  <!-- Drum handle & neck -->
  <path d="M 140 160 Q 140 130 170 130 L 200 130 Q 210 130 210 145 L 210 160" fill="none" stroke="#C7D9F8" stroke-width="20" stroke-linecap="round"/>
  <rect x="230" y="130" width="40" height="30" rx="5" fill="#B8CDF5"/>

  <!-- Drum cap -->
  <rect x="225" y="115" width="50" height="20" rx="4" fill="#1D4ED8"/>

  <!-- Label on drum -->
  <rect x="135" y="195" width="130" height="130" rx="10" fill="white" opacity="0.85"/>

  <!-- Brand mark on label -->
  <rect x="150" y="215" width="100" height="6" rx="3" fill="#1D4ED8" opacity="0.7"/>
  <rect x="150" y="230" width="70" height="4" rx="2" fill="#93B4F5" opacity="0.7"/>
  <rect x="150" y="245" width="90" height="4" rx="2" fill="#CBD5E1" opacity="0.7"/>
  <rect x="150" y="255" width="90" height="4" rx="2" fill="#CBD5E1" opacity="0.7"/>
  <rect x="150" y="265" width="60" height="4" rx="2" fill="#CBD5E1" opacity="0.7"/>

  <!-- Drop icon on label -->
  <path d="M 235 285 Q 245 270 255 285 Q 255 300 245 305 Q 235 300 235 285Z" fill="#1D4ED8" opacity="0.35"/>

  <!-- Drum highlight -->
  <rect x="130" y="175" width="12" height="120" rx="6" fill="white" opacity="0.25"/>

  <!-- Sparkle dots -->
  <circle cx="100" cy="120" r="5" fill="#1D4ED8" opacity="0.12"/>
  <circle cx="88" cy="108" r="3" fill="#1D4ED8" opacity="0.08"/>
  <circle cx="113" cy="105" r="2.5" fill="#1D4ED8" opacity="0.1"/>
  <circle cx="300" cy="380" r="6" fill="#1D4ED8" opacity="0.1"/>
  <circle cx="315" cy="368" r="3.5" fill="#1D4ED8" opacity="0.07"/>
  <circle cx="290" cy="365" r="2.5" fill="#1D4ED8" opacity="0.09"/>

  <!-- Bottom text -->
  <text x="200" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="1">AMAHLE BLUE</text>
  <text x="200" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#CBD5E1" text-anchor="middle" letter-spacing="0.5">Bulk Supply Preview</text>
</svg>
